<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTEFACT_TITLE — Khaled Sanad</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #141414;
      --surface:   #1a1a1a;
      --border:    rgba(255,255,255,0.07);
      --text:      #f5f2ed;
      --text-sub:  rgba(245,242,237,0.45);
      --text-dim:  rgba(245,242,237,0.2);
      --gold:      #c9a96e;
      --gold-dim:  rgba(201,169,110,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .artefact-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: var(--text-sub);
    }

    .artefact-name strong {
      font-weight: 400;
      color: var(--text);
    }

    .status-badge {
      font-size: .72rem;
      letter-spacing: .11em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.3);
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      background: var(--gold-dim);
    }

    /* ── Body ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2.5rem;
      text-align: center;
    }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      color: var(--text-dim);
    }

    .placeholder-icon svg {
      width: 22px;
      height: 22px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .descriptor {
      font-size: 0.72rem;
      line-height: 1.8;
      color: var(--text-sub);
      max-width: 480px;
      margin: 0 auto 3rem;
    }

    .meta-row {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .meta-item {
      text-align: left;
    }

    .meta-label {
      font-size: .72rem;
      letter-spacing: .11em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .meta-value {
      font-size: .74rem;
      color: var(--text-sub);
    }

    /* ── Footer ── */
    footer {
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-text {
      font-size: .72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .footer-tag {
      font-size: .72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="artefact-name">Khaled Sanad: <strong>ARTEFACT_TITLE</strong></div>
    <span class="status-badge">In Development</span>
  </header>

  <main>
    <div class="placeholder-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <!-- REPLACE THIS SVG PATH with one relevant to the artefact -->
        <!-- Decision Matrix: grid icon -->
        <!-- Deployment Strategy: layers/milestone icon -->
        <!-- Data Risk Assessment: shield icon -->
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>

    <h1>ARTEFACT_TITLE</h1>

    <p class="descriptor">ARTEFACT_DESCRIPTION</p>

    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-label">Category</div>
        <div class="meta-value">ARTEFACT_CATEGORY</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Status</div>
        <div class="meta-value">In development</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Data model</div>
        <div class="meta-value">ARTEFACT_DATA_MODEL</div>
      </div>
    </div>
  </main>

  <footer>
    <span class="footer-text">Khaled Sanad — Portfolio</span>
    <span class="footer-tag">ARTEFACT_TAG</span>
  </footer>

</body>
</html>
